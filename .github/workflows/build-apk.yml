name: Build APK

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configure signing
        env:
          XPOD_KEYSTORE_BASE64: ${{ secrets.XPOD_KEYSTORE_BASE64 }}
          XPOD_KEYSTORE_PASSWORD: ${{ secrets.XPOD_KEYSTORE_PASSWORD }}
          XPOD_KEY_ALIAS: ${{ secrets.XPOD_KEY_ALIAS }}
          XPOD_KEY_PASSWORD: ${{ secrets.XPOD_KEY_PASSWORD }}
        run: |
          test -n "$XPOD_KEYSTORE_BASE64"
          test -n "$XPOD_KEYSTORE_PASSWORD"
          test -n "$XPOD_KEY_ALIAS"
          test -n "$XPOD_KEY_PASSWORD"
          mkdir -p keystore
          echo "$XPOD_KEYSTORE_BASE64" | base64 --decode > keystore/xpod-release.jks
          {
            echo "storeFile=keystore/xpod-release.jks"
            echo "storePassword=$XPOD_KEYSTORE_PASSWORD"
            echo "keyAlias=$XPOD_KEY_ALIAS"
            echo "keyPassword=$XPOD_KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: xpod-${{ github.ref_name }}-release-apk
          path: app/build/outputs/apk/release/*-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" app/build/outputs/apk/release/*-release.apk \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" app/build/outputs/apk/release/*-release.apk \
              --repo "$GITHUB_REPOSITORY" \
              --title "XPOD $GITHUB_REF_NAME" \
              --generate-notes
          fi
